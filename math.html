<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>容量與容積換算拔河賽</title>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --rope-brown: #8b4513; }
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; background-color: #f8f9fa; user-select: none; }
        
        /* 難度選擇螢幕 */
        #setup-screen { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .difficulty-container { display: flex; gap: 20px; margin-top: 20px; }
        .mode-btn { width: 200px; padding: 30px; border: 3px solid #eee; border-radius: 20px; cursor: pointer; text-align: center; transition: 0.3s; }
        .mode-btn:hover { border-color: var(--blue); background: #ebf5ff; transform: translateY(-5px); }
        .mode-btn h2 { margin: 0 0 10px 0; color: #333; }

        /* 遊戲主畫面 */
        #game-screen { display: none; height: 100vh; flex-direction: column; }

        /* 中間拔河競技場 */
        #arena { height: 25vh; background: #fff; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 2px dashed #bbb; overflow: hidden; }
        #rope-system { position: absolute; width: 2000px; display: flex; align-items: center; justify-content: center; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .rope-line { width: 100%; height: 8px; background: var(--rope-brown); position: relative; }
        .center-flag { position: absolute; left: 50%; top: -15px; width: 4px; height: 40px; background: #ff0; border: 2px solid #333; transform: translateX(-50%); }
        
        /* CSS 畫小人 */
        .stick-man { font-size: 60px; position: absolute; top: -55px; }
        .blue-team-man { left: calc(50% - 150px); transform: scaleX(-1); } /* 藍隊面向右 */
        .red-team-man { left: calc(50% + 50px); } /* 紅隊面向左 */

        /* 下方對戰區 */
        #battle-ground { display: flex; flex: 1; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; position: relative; }
        .team-1 { background-color: #e3f2fd; border-right: 1px solid #ccc; }
        .team-2 { background-color: #ffebee; }

        .question-card { background: white; width: 90%; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; text-align: center; }
        .q-text { font-size: 24px; font-weight: bold; color: #444; min-height: 40px; }
        .display-box { background: #eee; width: 100%; height: 50px; line-height: 50px; font-size: 30px; font-weight: bold; margin-top: 10px; border-radius: 5px; }

        /* 數字鍵盤 */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 260px; }
        .key { padding: 20px; font-size: 22px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: white; box-shadow: 0 3px 0 #ddd; }
        .key:active { transform: translateY(3px); box-shadow: none; }
        .key-enter { grid-column: span 1; color: white; }
        .t1-enter { background: var(--blue); }
        .t2-enter { background: var(--red); }
        .key-clear { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>📏 容量與容積換算拔河賽 📏</h1>
    <p>請選擇遊戲難度：</p>
    <div class="difficulty-container">
        <div class="mode-btn" onclick="initGame('easy')">
            <h2>基礎模式</h2>
            <p>純整數換算<br>(1 L = 1000 mL)</p>
        </div>
        <div class="mode-btn" onclick="initGame('hard')">
            <h2>進階模式</h2>
            <p>包含小數換算<br>(0.5 m³ = ? L)</p>
        </div>
    </div>
</div>

<div id="game-screen">
    <div id="arena">
        <div id="rope-system" id="ropeSystem">
            <div class="rope-line">
                <div class="center-flag"></div>
                <div class="stick-man blue-team-man">🏃‍♂️🏃‍♂️</div>
                <div class="stick-man red-team-man">🏃‍♂️🏃‍♂️</div>
            </div>
        </div>
    </div>

    <div id="battle-ground">
        <div class="team-side team-1">
            <h2 style="color: var(--blue)">藍隊 (Team 1)</h2>
            <div class="question-card">
                <div id="q1" class="q-text">題目載入中...</div>
                <div id="display1" class="display-box"></div>
            </div>
            <div class="numpad" id="pad1"></div>
        </div>

        <div class="team-side team-2">
            <h2 style="color: var(--red)">紅隊 (Team 2)</h2>
            <div class="question-card">
                <div id="q2" class="q-text">題目載入中...</div>
                <div id="display2" class="display-box"></div>
            </div>
            <div class="numpad" id="pad2"></div>
        </div>
    </div>
</div>

<script>
    const units = [
        { name: 'm³', ratio: 1000000 },
        { name: 'cm³', ratio: 1 },
        { name: 'L', ratio: 1000 },
        { name: 'mL', ratio: 1 }
    ];

    let gameConfig = { difficulty: 'easy', offset: 0 };
    let player1 = { input: "", answer: 0 };
    let player2 = { input: "", answer: 0 };

    function initGame(mode) {
        gameConfig.difficulty = mode;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        buildPad('pad1', 't1');
        buildPad('pad2', 't2');
        
        newQuestion(1);
        newQuestion(2);
    }

    function buildPad(containerId, teamTag) {
        const container = document.getElementById(containerId);
        const keys = ['1','2','3','4','5','6','7','8','9','.', '0', 'C', 'OK'];
        
        keys.forEach(k => {
            const btn = document.createElement('button');
            btn.innerText = k;
            btn.className = 'key';
            if(k === 'OK') btn.classList.add('key-enter', teamTag === 't1' ? 't1-enter' : 't2-enter');
            if(k === 'C') btn.classList.add('key-clear');
            
            btn.onclick = () => handleInput(teamTag, k);
            container.appendChild(btn);
        });
    }

    function newQuestion(playerNum) {
        let u1 = Math.floor(Math.random() * units.length);
        let u2;
        do { u2 = Math.floor(Math.random() * units.length); } while(u1 === u2);

        let val = (gameConfig.difficulty === 'easy') 
            ? Math.floor(Math.random() * 15) + 1 
            : (Math.random() * 8 + 0.2).toFixed(1);

        let ans = (val * units[u1].ratio) / units[u2].ratio;
        // 修正 JavaScript 浮點數精度問題
        ans = parseFloat(Number(ans).toPrecision(12));

        if(playerNum === 1) {
            player1.answer = ans;
            player1.input = "";
            document.getElementById('q1').innerText = `${val} ${units[u1].name} = ? ${units[u2].name}`;
            document.getElementById('display1').innerText = "";
        } else {
            player2.answer = ans;
            player2.input = "";
            document.getElementById('q2').innerText = `${val} ${units[u1].name} = ? ${units[u2].name}`;
            document.getElementById('display2').innerText = "";
        }
    }

    function handleInput(team, key) {
        let p = (team === 't1') ? player1 : player2;
        let disp = document.getElementById(team === 't1' ? 'display1' : 'display2');

        if(key === 'OK') {
            submitAnswer(team);
        } else if(key === 'C') {
            p.input = "";
        } else {
            if(key === '.' && p.input.includes('.')) return;
            p.input += key;
        }
        disp.innerText = p.input;
    }

    function submitAnswer(team) {
        let p = (team === 't1') ? player1 : player2;
        if(parseFloat(p.input) === p.answer) {
            // 答對了，移動繩子
            gameConfig.offset += (team === 't1' ? -50 : 50);
            updateRope();
            
            // 檢查是否獲勝 (位移超過 250 像素)
            if(Math.abs(gameConfig.offset) >= 250) {
                setTimeout(() => {
                    alert((team === 't1' ? "藍隊" : "紅隊") + " 獲得最終勝利！");
                    location.reload();
                }, 100);
            } else {
                newQuestion(team === 't1' ? 1 : 2);
            }
        } else {
            // 答錯閃爍一下紅框
            p.input = "";
            document.getElementById(team === 't1' ? 'display1' : 'display2').innerText = "❌";
            setTimeout(() => newQuestion(team === 't1' ? 1 : 2), 500);
        }
    }

    function updateRope() {
        document.getElementById('rope-system').style.transform = `translateX(${gameConfig.offset}px)`;
    }
</script>

</body>
</html>
