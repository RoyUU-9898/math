<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>容量與容積換算對抗賽</title>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --rope-brown: #8b4513; }
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; background-color: #f0f3f5; user-select: none; overflow: hidden; }
        
        /* 設定畫面 */
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .config-section { margin: 20px; text-align: center; }
        .mode-container { display: flex; gap: 20px; }
        .mode-btn { width: 150px; padding: 20px; border: 3px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { border-color: var(--blue); background: #e3f2fd; }
        select { font-size: 18px; padding: 5px 15px; border-radius: 5px; }
        #start-btn { margin-top: 30px; padding: 15px 50px; font-size: 24px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* 遊戲頂部資訊 */
        #top-bar { height: 60px; background: #333; color: white; display: flex; justify-content: space-around; align-items: center; font-size: 20px; }
        .back-btn { padding: 5px 15px; background: #666; border: none; color: white; border-radius: 5px; cursor: pointer; }

        /* 競技場 */
        #arena { height: 20vh; background: #fff; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 2px dashed #ccc; overflow: hidden; }
        #rope-system { position: absolute; width: 2000px; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease-out; }
        .rope-line { width: 100%; height: 8px; background: var(--rope-brown); position: relative; }
        .center-flag { position: absolute; left: 50%; top: -15px; width: 6px; height: 40px; background: #ffeb3b; border: 2px solid #333; transform: translateX(-50%); z-index: 5; }
        .win-line { position: absolute; width: 2px; height: 100px; background: rgba(0,0,0,0.1); top: -50px; }
        .stick-man { font-size: 50px; position: absolute; top: -50px; }
        .blue-man { left: calc(50% - 160px); transform: scaleX(-1); }
        .red-man { left: calc(50% + 60px); }

        /* 對戰區 */
        #battle-ground { display: flex; height: calc(80vh - 60px); }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .team-1 { background-color: #e3f2fd; border-right: 2px solid #ddd; }
        .team-2 { background-color: #ffebee; }
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .question-card { background: white; width: 90%; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .display-box { height: 45px; line-height: 45px; font-size: 28px; background: #eee; margin-top: 10px; border-radius: 5px; font-weight: bold; }

        /* 鍵盤 */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 240px; margin-top: 10px; }
        .key { padding: 18px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; background: white; box-shadow: 0 3px 0 #ccc; }
        .key:active { transform: translateY(2px); box-shadow: none; }
        .key-ok { color: white; font-weight: bold; }
        .t1-ok { background: var(--blue); }
        .t2-ok { background: var(--red); }
        .key-x { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>🏆 容量與容積拔河對抗賽 🏆</h1>
    <div class="config-section">
        <p>1. 選擇難度：</p>
        <div class="mode-container">
            <div id="m-easy" class="mode-btn active" onclick="setMode('easy')"><h3>基礎</h3><p>整數換算</p></div>
            <div id="m-hard" class="mode-btn" onclick="setMode('hard')"><h3>進階</h3><p>小數換算</p></div>
        </div>
    </div>
    <div class="config-section">
        <p>2. 設定時間：
            <select id="time-select">
                <option value="60">1 分鐘</option>
                <option value="120">2 分鐘</option>
                <option value="180" selected>3 分鐘</option>
                <option value="300">5 分鐘</option>
            </select>
        </p>
    </div>
    <button id="start-btn" onclick="startGame()">開始比賽</button>
</div>

<div id="top-bar">
    <button class="back-btn" onclick="resetGame()">⬅ 返回選單</button>
    <div id="timer-display">剩餘時間：03:00</div>
    <div>勝負目標：拉動旗子越過界線</div>
</div>

<div id="game-screen" style="display:none;">
    <div id="arena">
        <div id="rope-system">
            <div class="rope-line">
                <div class="center-flag"></div>
                <div class="stick-man blue-man">🏃‍♂️🏃‍♂️</div>
                <div class="stick-man red-man">🏃‍♂️🏃‍♂️</div>
            </div>
        </div>
        <div class="win-line" style="left: calc(50% - 200px);"></div>
        <div class="win-line" style="left: calc(50% + 200px);"></div>
    </div>

    <div id="battle-ground">
        <div class="team-side team-1">
            <div class="score-board">藍隊得分: <span id="s1">0</span></div>
            <div class="question-card">
                <div id="q1" style="font-size:22px; font-weight:bold;">題目載入中...</div>
                <div id="display1" class="display-box"></div>
            </div>
            <div class="numpad" id="pad1"></div>
        </div>

        <div class="team-side team-2">
            <div class="score-board">紅隊得分: <span id="s2">0</span></div>
            <div class="question-card">
                <div id="q2" style="font-size:22px; font-weight:bold;">題目載入中...</div>
                <div id="display2" class="display-box"></div>
            </div>
            <div class="numpad" id="pad2"></div>
        </div>
    </div>
</div>

<script>
    const units = [
        { name: 'm³', ratio: 1000000 }, { name: 'cm³', ratio: 1 },
        { name: 'L', ratio: 1000 }, { name: 'mL', ratio: 1 }
    ];

    let game = {
        mode: 'easy',
        timeLeft: 180,
        offset: 0, // 負值往藍, 正值往紅
        t1Score: 0, t2Score: 0,
        t1Data: { input: "", ans: 0 },
        t2Data: { input: "", ans: 0 },
        timer: null,
        active: false
    };

    function setMode(m) {
        game.mode = m;
        document.getElementById('m-easy').classList.toggle('active', m === 'easy');
        document.getElementById('m-hard').classList.toggle('active', m === 'hard');
    }

    function startGame() {
        game.active = true;
        game.timeLeft = parseInt(document.getElementById('time-select').value);
        game.offset = 0;
        game.t1Score = 0; game.t2Score = 0;
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        initPads();
        newQ(1); newQ(2);
        startTimer();
        updateUI();
    }

    function initPads() {
        ['t1', 't2'].forEach(team => {
            const container = document.getElementById(team === 't1' ? 'pad1' : 'pad2');
            container.innerHTML = "";
            const keys = ['1','2','3','4','5','6','7','8','9','.', '0', 'X', 'OK'];
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.innerText = k;
                btn.className = 'key';
                if(k === 'OK') btn.classList.add('key-ok', team === 't1' ? 't1-ok' : 't2-ok');
                if(k === 'X') btn.classList.add('key-x');
                btn.onclick = () => handleInput(team, k);
                container.appendChild(btn);
            });
        });
    }

    function newQ(pNum) {
        let u1 = Math.floor(Math.random() * units.length);
        let u2; do { u2 = Math.floor(Math.random() * units.length); } while(u1 === u2);

        let val;
        if (game.mode === 'easy') {
            // 基礎模式：確保結果為整數
            // 若從大單位換小單位，給予 1~10 的整數
            // 若從小單位換大單位，則給予比例倍數的整數
            if(units[u1].ratio >= units[u2].ratio) {
                val = Math.floor(Math.random() * 10) + 1;
            } else {
                let ratio = units[u2].ratio / units[u1].ratio;
                val = (Math.floor(Math.random() * 5) + 1) * ratio;
            }
        } else {
            val = (Math.random() * 5 + 0.1).toFixed(1);
        }

        let ans = (val * units[u1].ratio) / units[u2].ratio;
        ans = parseFloat(Number(ans).toPrecision(12));

        if(pNum === 1) {
            game.t1Data = { q: `${val} ${units[u1].name} = ? ${units[u2].name}`, ans: ans, input: "" };
            document.getElementById('q1').innerText = game.t1Data.q;
        } else {
            game.t2Data = { q: `${val} ${units[u1].name} = ? ${units[u2].name}`, ans: ans, input: "" };
            document.getElementById('q2').innerText = game.t2Data.q;
        }
        updateUI();
    }

    function handleInput(team, key) {
        let data = (team === 't1') ? game.t1Data : game.t2Data;
        if(key === 'OK') {
            checkAns(team);
        } else if(key === 'X') {
            data.input = "";
        } else {
            if(key === '.' && data.input.includes('.')) return;
            data.input += key;
        }
        updateUI();
    }

    function checkAns(team) {
        let data = (team === 't1') ? game.t1Data : game.t2Data;
        if(parseFloat(data.input) === data.ans) {
            if(team === 't1') { game.t1Score++; game.offset -= 40; }
            else { game.t2Score++; game.offset += 40; }
        } else {
            // 答錯：對方拉動繩子
            if(team === 't1') { game.offset += 20; }
            else { game.offset -= 20; }
        }
        
        updateUI();
        if(Math.abs(game.offset) >= 200) endGame(game.offset < 0 ? "藍隊" : "紅隊");
        else newQ(team === 't1' ? 1 : 2);
    }

    function updateUI() {
        document.getElementById('display1').innerText = game.t1Data.input;
        document.getElementById('display2').innerText = game.t2Data.input;
        document.getElementById('s1').innerText = game.t1Score;
        document.getElementById('s2').innerText = game.t2Score;
        document.getElementById('rope-system').style.transform = `translateX(${game.offset}px)`;
    }

    function startTimer() {
        if(game.timer) clearInterval(game.timer);
        game.timer = setInterval(() => {
            game.timeLeft--;
            let m = Math.floor(game.timeLeft / 60);
            let s = game.timeLeft % 60;
            document.getElementById('timer-display').innerText = `剩餘時間：${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(game.timeLeft <= 0) {
                clearInterval(game.timer);
                let winner = game.offset === 0 ? "平手" : (game.offset < 0 ? "藍隊" : "紅隊");
                endGame(winner);
            }
        }, 1000);
    }

    function endGame(winner) {
        game.active = false;
        clearInterval(game.timer);
        alert("比賽結束！\n結果：" + (winner === "平手" ? "雙方平手！" : winner + " 獲勝！"));
        resetGame();
    }

    function resetGame() {
        clearInterval(game.timer);
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
    }
</script>
</body>
</html>
