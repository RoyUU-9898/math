<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>容量與容積換算對抗賽 - 進階邏輯版</title>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --rope-brown: #8b4513; }
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; background-color: #f0f3f5; user-select: none; overflow: hidden; touch-action: none; }
        
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .config-section { margin: 15px; text-align: center; }
        .mode-container { display: flex; gap: 20px; }
        .mode-btn { width: 140px; padding: 15px; border: 3px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { border-color: var(--blue); background: #e3f2fd; }
        select { font-size: 20px; padding: 5px 15px; border-radius: 5px; }
        #start-btn { margin-top: 25px; padding: 15px 60px; font-size: 26px; background: #2ecc71; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #27ae60; }

        #top-bar { height: 60px; background: #333; color: white; display: flex; justify-content: space-around; align-items: center; font-size: 20px; }
        .back-btn { padding: 8px 15px; background: #555; border: none; color: white; border-radius: 5px; cursor: pointer; }

        #arena { height: 22vh; background: #fff; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 2px dashed #ccc; overflow: hidden; }
        #rope-system { position: absolute; width: 2400px; display: flex; align-items: center; justify-content: center; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .rope-line { width: 100%; height: 10px; background: var(--rope-brown); position: relative; border-radius: 5px; }
        .center-flag { position: absolute; left: 50%; top: -15px; width: 8px; height: 45px; background: #ffeb3b; border: 2px solid #333; transform: translateX(-50%); z-index: 5; }
        .win-line { position: absolute; width: 4px; height: 120px; background: rgba(0,0,0,0.1); top: -60px; border-radius: 2px; }
        .stick-man { font-size: 55px; position: absolute; top: -55px; pointer-events: none; }
        .blue-man { left: calc(50% - 180px); transform: scaleX(-1); }
        .red-man { left: calc(50% + 80px); }

        #battle-ground { display: flex; height: calc(78vh - 60px); }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; touch-action: none; }
        .team-1 { background-color: #e3f2fd; border-right: 2px solid #ddd; }
        .team-2 { background-color: #ffebee; }
        .score-board { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
        .question-card { background: white; width: 92%; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 2px solid transparent; }
        .display-box { height: 50px; line-height: 50px; font-size: 32px; background: #f8f9fa; margin-top: 12px; border-radius: 8px; font-weight: bold; color: #333; border: 1px inset #ddd; overflow: hidden; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 280px; margin-top: 15px; }
        .key { padding: 18px 0; font-size: 24px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: white; box-shadow: 0 4px 0 #ccc; touch-action: none; }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #ccc; }
        .key-ok { color: white; grid-column: span 1; }
        .t1-ok { background: var(--blue); box-shadow: 0 4px 0 #2980b9; }
        .t2-ok { background: var(--red); box-shadow: 0 4px 0 #c0392b; }
        .key-del { background: #f39c12; color: white; box-shadow: 0 4px 0 #d35400; }
        .key-clear { background: #95a5a6; color: white; box-shadow: 0 4px 0 #7f8c8d; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>🏆 容量與容積拔河對抗賽 🏆</h1>
    <div class="config-section">
        <p>1. 選擇難度：</p>
        <div class="mode-container">
            <div id="m-easy" class="mode-btn active" onpointerdown="setMode('easy')"><h3>基礎</h3><p>答案為整數</p></div>
            <div id="m-hard" class="mode-btn" onpointerdown="setMode('hard')"><h3>進階</h3><p>答案含小數</p></div>
        </div>
    </div>
    <div class="config-section">
        <p>2. 設定時間：
            <select id="time-select">
                <option value="60">1 分鐘</option>
                <option value="120">2 分鐘</option>
                <option value="180" selected>3 分鐘</option>
                <option value="240">4 分鐘</option>
                <option value="300">5 分鐘</option>
            </select>
        </p>
    </div>
    <button id="start-btn" onpointerdown="startGame()">開始比賽</button>
</div>

<div id="top-bar">
    <button class="back-btn" onpointerdown="resetGame()">⬅ 返回選單</button>
    <div id="timer-display">剩餘時間：03:00</div>
    <div></div> </div>

<div id="game-screen" style="display:none;">
    <div id="arena">
        <div id="rope-system">
            <div class="rope-line">
                <div class="center-flag"></div>
                <div class="stick-man blue-man">🏃‍♂️🏃‍♂️</div>
                <div class="stick-man red-man">🏃‍♂️🏃‍♂️</div>
            </div>
        </div>
        <div class="win-line" style="left: calc(50% - 250px); border-left: 3px solid var(--blue);"></div>
        <div class="win-line" style="left: calc(50% + 250px); border-right: 3px solid var(--red);"></div>
    </div>

    <div id="battle-ground">
        <div class="team-side team-1">
            <div class="score-board">藍隊得分: <span id="s1">0</span></div>
            <div class="question-card" id="card1">
                <div id="q1" style="font-size:24px; font-weight:bold;">載入中...</div>
                <div id="display1" class="display-box"></div>
            </div>
            <div class="numpad" id="pad1"></div>
        </div>

        <div class="team-side team-2">
            <div class="score-board">紅隊得分: <span id="s2">0</span></div>
            <div class="question-card" id="card2">
                <div id="q2" style="font-size:24px; font-weight:bold;">載入中...</div>
                <div id="display2" class="display-box"></div>
            </div>
            <div class="numpad" id="pad2"></div>
        </div>
    </div>
</div>

<script>
    const units = [
        { name: 'm³', ratio: 1000000 }, { name: 'cm³', ratio: 1 },
        { name: 'L', ratio: 1000 }, { name: 'mL', ratio: 1 }
    ];

    let game = {
        mode: 'easy',
        timeLeft: 180,
        offset: 0,
        t1Score: 0, t2Score: 0,
        t1Data: { input: "", ans: 0 },
        t2Data: { input: "", ans: 0 },
        timer: null
    };

    function setMode(m) {
        game.mode = m;
        document.getElementById('m-easy').classList.toggle('active', m === 'easy');
        document.getElementById('m-hard').classList.toggle('active', m === 'hard');
    }

    function startGame() {
        game.timeLeft = parseInt(document.getElementById('time-select').value);
        game.offset = 0; game.t1Score = 0; game.t2Score = 0;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        initPads();
        newQ(1); newQ(2);
        startTimer();
        updateUI();
    }

    function initPads() {
        ['t1', 't2'].forEach(team => {
            const container = document.getElementById(team === 't1' ? 'pad1' : 'pad2');
            container.innerHTML = "";
            const keys = ['1','2','3','4','5','6','7','8','9','.', '0', '⌫', 'X', 'OK'];
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.innerText = k;
                btn.className = 'key';
                if(k === 'OK') btn.classList.add('key-ok', team === 't1' ? 't1-ok' : 't2-ok');
                else if(k === '⌫') btn.classList.add('key-del');
                else if(k === 'X') btn.classList.add('key-clear');
                
                btn.onpointerdown = (e) => {
                    e.preventDefault();
                    handleInput(team, k);
                };
                container.appendChild(btn);
            });
        });
    }

    function newQ(pNum) {
        let u1 = Math.floor(Math.random() * units.length);
        let u2; do { u2 = Math.floor(Math.random() * units.length); } while(u1 === u2);

        let val, ans;
        if (game.mode === 'easy') {
            // 基礎模式：答案必須為整數
            if(units[u1].ratio >= units[u2].ratio) {
                val = Math.floor(Math.random() * 9) + 1; // 大換小必為整數
            } else {
                let ratio = units[u2].ratio / units[u1].ratio;
                val = (Math.floor(Math.random() * 5) + 1) * ratio; // 小換大需為倍數
            }
        } else {
            // 進階模式：題目是整數，但答案要有小數
            // 例如：500 mL = ? L (0.5) 或 100 cm3 = ? L (0.1)
            if(units[u1].ratio < units[u2].ratio) {
                // 由小單位換大單位，給予非整除的題目
                const possibleVals = [100, 200, 500, 1500, 2500, 50, 250, 750];
                val = possibleVals[Math.floor(Math.random() * possibleVals.length)];
            } else {
                // 由大單位換小單位（較難出現小數答案，故此處微調題目使其產生小數）
                val = (Math.floor(Math.random() * 9) + 1);
                // 強制讓某些大換小題目出現小數（例如 0.5 m3，但你要求題目是整數）
                // 為了符合「題目是整數，答案是小數」，我們專注於「小換大」
                let ratio = units[u2].ratio / units[u1].ratio;
                val = Math.floor(Math.random() * (ratio - 1)) + 1; 
                if (val % ratio === 0) val += 1; // 確保不整除
            }
        }

        ans = (val * units[u1].ratio) / units[u2].ratio;
        ans = parseFloat(Number(ans).toPrecision(12));

        if(pNum === 1) {
            game.t1Data = { q: `${val} ${units[u1].name} = ? ${units[u2].name}`, ans: ans, input: "" };
            document.getElementById('q1').innerText = game.t1Data.q;
        } else {
            game.t2Data = { q: `${val} ${units[u1].name} = ? ${units[u2].name}`, ans: ans, input: "" };
            document.getElementById('q2').innerText = game.t2Data.q;
        }
        updateUI();
    }

    function handleInput(team, key) {
        let data = (team === 't1') ? game.t1Data : game.t2Data;
        if(key === 'OK') {
            checkAns(team);
        } else if(key === 'X') {
            data.input = "";
        } else if(key === '⌫') {
            data.input = data.input.slice(0, -1);
        } else {
            if(key === '.' && data.input.includes('.')) return;
            if(data.input.length < 10) data.input += key;
        }
        updateUI();
    }

    function checkAns(team) {
        let data = (team === 't1') ? game.t1Data : game.t2Data;
        let card = document.getElementById(team === 't1' ? 'card1' : 'card2');
        
        if(parseFloat(data.input) === data.ans) {
            if(team === 't1') { game.t1Score++; game.offset -= 50; }
            else { game.t2Score++; game.offset += 50; }
            card.style.borderColor = "#2ecc71";
            setTimeout(() => { card.style.borderColor = "transparent"; newQ(team === 't1' ? 1 : 2); }, 300);
        } else {
            if(team === 't1') { game.offset += 25; }
            else { game.offset -= 25; }
            card.style.borderColor = "#e74c3c";
            data.input = "";
            setTimeout(() => { card.style.borderColor = "transparent"; updateUI(); }, 400);
        }
        
        updateUI();
        if(Math.abs(game.offset) >= 250) endGame(game.offset < 0 ? "藍隊" : "紅隊");
    }

    function updateUI() {
        document.getElementById('display1').innerText = game.t1Data.input;
        document.getElementById('display2').innerText = game.t2Data.input;
        document.getElementById('s1').innerText = game.t1Score;
        document.getElementById('s2').innerText = game.t2Score;
        document.getElementById('rope-system').style.transform = `translateX(${game.offset}px)`;
    }

    function startTimer() {
        if(game.timer) clearInterval(game.timer);
        game.timer = setInterval(() => {
            game.timeLeft--;
            let m = Math.floor(game.timeLeft / 60);
            let s = game.timeLeft % 60;
            document.getElementById('timer-display').innerText = `剩餘時間：${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(game.timeLeft <= 0) endGame(game.offset === 0 ? "平手" : (game.offset < 0 ? "藍隊" : "紅隊"));
        }, 1000);
    }

    function endGame(winner) {
        clearInterval(game.timer);
        setTimeout(() => {
            alert("🎊 比賽結束 🎊\n結果：" + (winner === "平手" ? "雙方平手！" : winner + " 獲得了勝利！"));
            resetGame();
        }, 100);
    }

    function resetGame() {
        clearInterval(game.timer);
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
    }
</script>
</body>
</html>
